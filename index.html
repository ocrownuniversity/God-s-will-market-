<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCROWN Marketplace | Shop Phones, Clothes & More</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .jumia-orange { color: #f68b1e; }
        .bg-jumia-orange { background-color: #f68b1e; }
        .product-card:hover { transform: translateY(-5px); transition: 0.3s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-3xl font-black text-orange-500 tracking-tighter">OCROWN</h1>
            
            <div class="flex-1 mx-8 relative">
                <input type="text" id="liveSearch" onkeyup="searchProducts()" placeholder="Search phones, appliances, fashion..." 
                    class="w-full border-2 border-gray-200 rounded-md py-2 px-4 focus:border-orange-500 outline-none">
                <div id="searchResults" class="absolute bg-white w-full mt-1 shadow-xl rounded-b-md hidden max-h-60 overflow-y-auto z-50"></div>
            </div>

            <div class="flex items-center space-x-6 font-medium">
                <button onclick="openAdmin()" class="hover:text-orange-500"><i class="fa-solid fa-user-tie"></i> Admin</button>
                <div class="relative">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-orange-500 text-white text-xs rounded-full px-1">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4">
        <div class="grid grid-cols-12 gap-4 mb-8">
            <div class="hidden lg:block col-span-3 bg-white rounded shadow-sm p-4 text-sm space-y-3">
                <p class="hover:text-orange-500 cursor-pointer"><i class="fa-solid fa-mobile-alt w-6"></i> Phones & Tablets</p>
                <p class="hover:text-orange-500 cursor-pointer"><i class="fa-solid fa-shirt w-6"></i> Fashion</p>
                <p class="hover:text-orange-500 cursor-pointer"><i class="fa-solid fa-tv w-6"></i> Home Appliances</p>
            </div>
            <div class="col-span-12 lg:col-span-9 bg-orange-500 rounded h-64 flex items-center justify-center text-white text-4xl font-bold">
                MEGA SALE: UP TO 50% OFF
            </div>
        </div>

        <h2 class="text-xl font-bold mb-4 uppercase border-b-2 border-orange-500 inline-block">Flash Sales</h2>
        <div id="productDisplay" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            </div>
    </main>

    <div id="checkoutModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-6 rounded-lg max-w-md w-full">
            <h2 class="text-2xl font-bold mb-4">Complete Your Order</h2>
            <div class="bg-blue-50 p-4 rounded mb-4 text-sm">
                <p class="font-bold text-blue-800">Bank Transfer Details:</p>
                <p>Bank: <strong>Stanbic IBTC</strong></p>
                <p>Account: <strong>0007761996</strong></p>
                <p>Name: <strong>Oladeji Opeyemi</strong></p>
            </div>
            <input type="email" placeholder="Enter Email" class="w-full border p-2 mb-2 rounded">
            <input type="password" placeholder="Enter Password" class="w-full border p-2 mb-4 rounded">
            <button onclick="confirmOrder()" class="w-full bg-orange-500 text-white py-3 rounded font-bold">PLACE ORDER (PAY ON DELIVERY)</button>
            <button onclick="closeModal()" class="w-full mt-2 text-gray-500">Cancel</button>
        </div>
    </div>

    <script>
        // 1. DATA: 100+ Products would usually come from a database. 
        // Here is a sample array structure to get you started.
        const products = [
            { id: 1, name: "iPhone 15 Pro Max", price: 1200000, category: "Phones", img: "https://via.placeholder.com/200", specs: "256GB, Titanium" },
            { id: 2, name: "Samsung Galaxy S24", price: 950000, category: "Phones", img: "https://via.placeholder.com/200", specs: "8GB RAM" },
            { id: 3, name: "Designer Leather Bag", price: 45000, category: "Bags", img: "https://via.placeholder.com/200", specs: "Brown, Large" },
            { id: 4, name: "Home Gas Cooker", price: 85000, category: "Appliances", img: "https://via.placeholder.com/200", specs: "4 Burners" },
            // Add more products here...
        ];

        // 2. RENDER PRODUCTS
        function displayProducts(items) {
            const container = document.getElementById('productDisplay');
            container.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded product-card cursor-pointer" onclick="showCheckout()">
                    <img src="${p.img}" class="w-full h-40 object-cover mb-2 rounded">
                    <p class="text-sm truncate">${p.name}</p>
                    <p class="font-bold text-lg">₦${p.price.toLocaleString()}</p>
                    <p class="text-xs text-gray-400">${p.specs}</p>
                </div>
            `).join('');
        }

        // 3. LIVE SEARCH LOGIC
        function searchProducts() {
            const query = document.getElementById('liveSearch').value.toLowerCase();
            const results = products.filter(p => p.name.toLowerCase().includes(query));
            displayProducts(results);
        }

        // 4. ADMIN LOGIN 
        function openAdmin() {
            let user = prompt("Enter Username:");
            let pass = prompt("Enter Password:");
            if(user === "OCROWN" && pass === "1234") {
                alert("Welcome Boss! Opening Dashboard...");
                window.location.href = "#admin-panel"; // In real life, link to admin.html
            } else {
                alert("Access Denied!");
            }
        }

        function showCheckout() { document.getElementById('checkoutModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('checkoutModal').classList.add('hidden'); }
        function confirmOrder() { alert("Order Placed! Please send proof of transfer to Oladeji Opeyemi."); closeModal(); }

        // Initial Load
        displayProducts(products);
    </script>
</body>
</html>
