<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God's Will Market</title>
<style>
  /* ======= Reset & Global ======= */
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: Arial, sans-serif; background:#f8f8f8; }
  a { text-decoration:none; color:inherit; }

  /* ======= Header ======= */
  header { background:#4A90E2; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; }
  header h1 { font-size:24px; }
  header nav a { margin-left:15px; font-weight:bold; }

  /* ======= Hero ======= */
  .hero { background:#50E3C2; color:white; padding:50px 20px; text-align:center; }
  .hero h2 { font-size:32px; margin-bottom:10px; }
  .hero p { font-size:18px; }

  /* ======= Product Grid ======= */
  .products { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px; }
  .product { background:white; padding:15px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); text-align:center; }
  .product img { width:100%; height:150px; object-fit:cover; border-radius:8px; }
  .product h3 { margin:10px 0; font-size:18px; }
  .product p { color:#555; margin:5px 0; }
  .product button { padding:10px 15px; background:#4A90E2; color:white; border:none; border-radius:5px; cursor:pointer; }
  .product button:hover { background:#357ABD; }

  /* ======= Cart ======= */
  #cart { position:fixed; top:80px; right:20px; background:white; border:1px solid #ccc; padding:15px; border-radius:10px; width:250px; max-height:70vh; overflow-y:auto; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
  #cart h3 { margin-bottom:10px; }
  #cart ul { list-style:none; margin-bottom:10px; }
  #cart li { display:flex; justify-content:space-between; margin-bottom:5px; }
  #cart button { padding:5px 8px; font-size:12px; background:red; border:none; color:white; border-radius:3px; cursor:pointer; }

  /* ======= Checkout ======= */
  #checkoutBtn { width:100%; padding:10px; background:green; color:white; border:none; border-radius:5px; cursor:pointer; }
  #checkoutBtn:hover { background:#006400; }

  /* ======= Admin Panel ======= */
  #adminPanel { padding:20px; display:none; background:#f0f0f0; }
  #adminPanel input, #adminPanel select { margin:5px 0; padding:8px; width:100%; }
  #adminPanel button { padding:10px; background:#4A90E2; color:white; border:none; border-radius:5px; cursor:pointer; margin-top:5px; }
  #adminPanel button:hover { background:#357ABD; }

  /* ======= Contact ======= */
  footer { background:#333; color:white; padding:20px; text-align:center; margin-top:20px; }

  /* ======= Responsive ======= */
  @media(max-width:600px){ header { flex-direction:column; } #cart{ width:90%; right:5%; } }
</style>
</head>
<body>

<header>
  <h1>God's Will Market</h1>
  <nav>
    <a href="#products">Products</a>
    <a href="#cart">Cart</a>
    <a href="#adminPanel">Admin</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="hero">
  <h2>Welcome to God's Will Market</h2>
  <p>Your one-stop marketplace for Clothes, Shoes, Bags & Accessories</p>
</div>

<section id="products" class="products">
  <!-- Sample Products -->
</section>

<div id="cart">
  <h3>Your Cart</h3>
  <ul id="cartItems"></ul>
  <p>Total: ₦<span id="totalPrice">0</span></p>
  <button id="checkoutBtn">Checkout</button>
</div>

<section id="adminPanel">
  <h2>Admin Panel</h2>
  <p>Login to manage products</p>
  <input type="text" id="adminUser" placeholder="Username">
  <input type="password" id="adminPass" placeholder="Password">
  <button id="adminLoginBtn">Login</button>

  <div id="adminControls" style="display:none;">
    <h3>Add Product</h3>
    <input type="text" id="prodName" placeholder="Product Name">
    <input type="number" id="prodPrice" placeholder="Price">
    <select id="prodCategory">
      <option value="Clothes">Clothes</option>
      <option value="Shoes">Shoes</option>
      <option value="Bags">Bags</option>
      <option value="Accessories">Accessories</option>
    </select>
    <input type="text" id="prodImg" placeholder="Image URL">
    <button id="addProdBtn">Add Product</button>
  </div>
</section>

<footer id="contact">
  <p>Address: Oluyoro, Ibadan | WhatsApp: 08033928982</p>
</footer>

<script>
  // ===== Sample Products =====
  let products = [
    {name:'T-Shirt', price:2500, category:'Clothes', img:'https://via.placeholder.com/200'},
    {name:'Sneakers', price:8000, category:'Shoes', img:'https://via.placeholder.com/200'},
    {name:'Leather Bag', price:12000, category:'Bags', img:'https://via.placeholder.com/200'},
    {name:'Watch', price:5000, category:'Accessories', img:'https://via.placeholder.com/200'}
  ];

  const productsContainer = document.getElementById('products');
  const cartItems = document.getElementById('cartItems');
  const totalPriceEl = document.getElementById('totalPrice');
  let cart = [];

  function renderProducts() {
    productsContainer.innerHTML = '';
    products.forEach((p,i)=>{
      const div = document.createElement('div');
      div.className='product';
      div.innerHTML=`<img src="${p.img}" alt="${p.name}"><h3>${p.name}</h3><p>₦${p.price}</p><button onclick="addToCart(${i})">Add to Cart</button>`;
      productsContainer.appendChild(div);
    });
  }

  function renderCart() {
    cartItems.innerHTML='';
    let total=0;
    cart.forEach((item,i)=>{
      total+=item.price;
      const li=document.createElement('li');
      li.innerHTML=`${item.name} - ₦${item.price} <button onclick="removeFromCart(${i})">x</button>`;
      cartItems.appendChild(li);
    });
    totalPriceEl.textContent=total;
  }

  function addToCart(index){
    cart.push(products[index]);
    renderCart();
  }

  function removeFromCart(index){
    cart.splice(index,1);
    renderCart();
  }

  document.getElementById('checkoutBtn').addEventListener('click',()=>{
    if(cart.length===0){ alert('Cart is empty'); return; }
    let order='Your order:%0A';
    cart.forEach(item=>{ order+=`${item.name} - ₦${item.price}%0A`; });
    order+=`Total: ₦${cart.reduce((a,b)=>a+b.price,0)}%0APayment: Cash on Delivery / Bank Transfer`;
    window.open(`https://wa.me/2348033928982?text=${order}`,'_blank');
  });

  renderProducts();

  // ===== Admin Panel =====
  const adminLoginBtn = document.getElementById('adminLoginBtn');
  const adminControls = document.getElementById('adminControls');

  adminLoginBtn.addEventListener('click',()=>{
    const user=document.getElementById('adminUser').value;
    const pass=document.getElementById('adminPass').value;
    if(user==='OCROWN' && pass==='1234'){
      adminControls.style.display='block';
      alert('Admin Logged In');
    }else{
      alert('Invalid Admin Credentials');
    }
  });

  document.getElementById('addProdBtn').addEventListener('click',()=>{
    const name=document.getElementById('prodName').value;
    const price=parseInt(document.getElementById('prodPrice').value);
    const category=document.getElementById('prodCategory').value;
    const img=document.getElementById('prodImg').value || 'https://via.placeholder.com/200';
    if(!name || !price){ alert('Fill name and price'); return; }
    products.push({name,price,category,img});
    renderProducts();
    alert('Product Added');
  });
</script>

</body>
</html>
